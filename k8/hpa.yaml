apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: infinity-search-hpa  # <- required!
  namespace: infinity
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: infinity-search  # <- the deployment to scale
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50